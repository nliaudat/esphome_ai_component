esphome:
  name: test-ai-reader
  friendly_name: Test AI Meter Reader
  on_boot:
    - priority: 100
      then:
        - logger.log:
            level: INFO
            format: "Camera reset sequence starting..."
        - lambda: |
            gpio_set_direction((gpio_num_t)32, GPIO_MODE_OUTPUT);
            gpio_set_level((gpio_num_t)32, 1);
            delay(100);
            gpio_set_level((gpio_num_t)32, 0);
            delay(100);
        - logger.log:
            level: INFO
            format: "Camera reset complete"
        - delay: 5s

substitutions:
  camera_pixel_format: "JPEG"

esp32:
  board: esp32cam
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_LWIP_MAX_SOCKETS: "16"
      CONFIG_MBEDTLS_PSK_MODES: "y"
      CONFIG_MBEDTLS_KEY_EXCHANGE_PSK: "y"
      CONFIG_SCCB_HARDWARE_I2C_DRIVER_NEW: "y"

psram:
  mode: quad
  speed: 40MHz

logger:
  level: DEBUG

api:
  encryption:
    key: "cqwDb9iGhiJj2WzCAguvh91S1hgEfoEQ1VwfMlaIMic="

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: LIGHT

external_components:
  - source:
      type: local
      path: components
    components:
      - tflite_micro_helper
      - esp32_camera_utils
      - flash_light_controller
      - meter_reader_tflite

tflite_micro_helper:

esp32_camera_utils:
  id: camera_utils_helper
  camera_id: meter_cam
  enable_rotation: true
  rotation: 0

flash_light_controller:
  id: flash_ctrl_helper
  flash_light: flash_led
  flash_pre_time: 2000ms
  flash_post_time: 4000ms
  debug: true

globals:
  - id: crop_zones
    type: std::string
    max_restore_data_length: 254
    # 5-digit config
    # initial_value: '"[[152,185,189,250],[188,186,230,251],[228,186,267,253],[268,185,310,254],[308,186,345,254]]"'
    # 8-digit config (active)
    initial_value: '"[[151,186,191,253],[188,186,230,252],[228,186,270,252],[266,186,308,252],[305,185,345,252],[347,188,367,223],[366,188,388,223],[385,188,410,223]]"'

output:
  - platform: ledc
    pin: GPIO4
    id: flash_output
    frequency: 20000Hz

light:
  - platform: monochromatic
    output: flash_output
    name: "Flash LED"
    id: flash_led
    restore_mode: ALWAYS_OFF
    default_transition_length: 0s

i2c:
  sda: GPIO26
  scl: GPIO27
  id: camera_i2c
  frequency: 100kHz
  sda_pullup_enabled: true
  scl_pullup_enabled: true

esp32_camera:
  name: "Water Meter Camera"
  id: meter_cam
  setup_priority: -200  # Delay initialization to allow camera reset first
  external_clock:
    pin: GPIO0
    frequency: 20MHz
  i2c_id: camera_i2c
  data_pins: [GPIO5, GPIO18, GPIO19, GPIO21, GPIO36, GPIO39, GPIO34, GPIO35]
  vsync_pin: GPIO25
  href_pin: GPIO23
  pixel_clock_pin: GPIO22
  power_down_pin: GPIO32
  resolution: 640x480
  jpeg_quality: 10
  max_framerate: 5 fps
  idle_framerate: 1 fps
  frame_buffer_location: PSRAM

web_server:
  port: 80

button:
  - platform: template
    name: "Toggle Crop Overlay"
    on_press:
      - lambda: |
          static bool show = true;
          show = !show;
          id(ai_meter_reader).set_show_crop_areas(show);
          ESP_LOGI("main", "Crop overlay: %s", show ? "ON" : "OFF");

number:
  - platform: template
    name: "Flash Brightness"
    id: flash_brightness
    min_value: 0
    max_value: 100
    step: 5
    initial_value: 100
    unit_of_measurement: "%"
    optimistic: true
    restore_value: true
    set_action:
      - light.control:
          id: flash_led
          brightness: !lambda "return x / 100.0;"
    on_value:
      - logger.log:
          format: "Flash brightness set to %.0f%%"
          args: [x]

  - platform: template
    name: "Low Confidence Threshold"
    id: low_confidence_threshold
    min_value: 0
    max_value: 100
    step: 5
    initial_value: 90
    unit_of_measurement: "%"
    optimistic: true
    restore_value: true
    set_action:
      - logger.log:
          format: "Low confidence threshold set to %.0f%%"
          args: [x]
    on_value:
      - lambda: |-
          id(ai_meter_reader)->set_low_confidence_threshold(x / 100.0f);
          ESP_LOGI("low_conf_thresh", "Threshold set to %.0f%%", x);

text_sensor:

sensor:
  - platform: template
    name: "AI Meter Reading"
    id: ai_meter_value
    unit_of_measurement: "m³"
    state_class: "total_increasing"
    device_class: "water"
    accuracy_decimals: 3
  - platform: template
    name: "AI Reading Confidence"
    id: ai_meter_confidence
    unit_of_measurement: "%"
    accuracy_decimals: 0

interval:
  - interval: 60s
    then:
      - lambda: |
          if (millis() < 30000) {
            ESP_LOGW("main", "Skipping early interval trigger");
            return;
          }
          // Set flash brightness before triggering inference
          id(flash_led).turn_on().set_brightness(id(flash_brightness).state / 100.0f).perform();
          id(ai_meter_reader).force_flash_inference();

meter_reader_tflite:
  id: ai_meter_reader
  camera_id: meter_cam
  model: "dig-class100-0168_s2_q.tflite"
  tensor_arena_size: 512KB
  confidence_threshold: 0.85
  crop_zones_global: crop_zones
  value_sensor: ai_meter_value
  confidence_sensor: ai_meter_confidence
  flash_light_controller: flash_ctrl_helper
  generate_preview: false
  show_crop_areas: false
  debug: true
