meter_reader_tflite:
  id: ${id_prefix}_meter_reader
  validator: ${id_prefix}_validator
  camera_id: ${id_prefix}_espcam
  # model: "models/digit_recognizer_v27_10cls_RGB.tflite" #testing
  # model: "models/digit_recognizer_v24_10cls_RGB_TQT.tflite" # testing TQT
  # model: "models/digit_recognizer_v23_10cls_RGB_QAT.tflite" # testing TQT
  # model: "models/digit_recognizer_v23_10cls_RGB_TQT.tflite" # testing TQT
  # model: "models/digit_recognizer_v23_10cls_RGB.tflite" #v17 also works great-25.05.2026
  # model: "models/digit_recognizer_v16_10cls_GRAY.tflite"
  # model: "models/digit_recognizer_v3_10cls_RGB.tflite" # 38.41 KB in flash | 0.9788 accuracy | 5172 inf/s | 70.11 KB memory footprint
  # model: "models/digit_recognizer_v4_10cls_RGB.tflite" # 78.33 KB in flash | 0.9924 accuracy | 6380 inf/s | 103.02 KB memory footprint
  # model: "models/digit_recognizer_v16_10cls_RGB.tflite" # 128.84 KB in flash | 0.9918 accuracy | 3907 inf/s | 246.28 KB memory footprint
  # model: "models/digit_recognizer_v17_10cls_RGB.tflite" # 71 Kb in flash | 0.9867 accuracy | 4810 inf/s | 174.11 KB memory footprint
  # model: "models/digit_recognizer_v23_10cls_RGB.tflite" # 62 Kb in flash | 0.9929 accuracy | 7585 inf/s | 81.61 KB memory footprint
  # model: "models/digit_recognizer_v16_full_integer_quant.tflite" #bad
  # model: "models/v23_full_integer_quant.tflite" #new good !
  ################### 19.06.2026
  # model: "models/digit_recognizer_v23_quantized_integer_quant_uint8.tflite" # 97.87% acc | inference in 2300ms | 262.33 KB memory footprint
  model: "models/digit_recognizer_v24_quantized_integer_quant_uint8.tflite" # 98.86% acc | inference in 2600ms | 135.29 KB memory footprint
  # model: "models/digit_recognizer_v16_quantized_integer_quant_uint8.tflite" # 99.46% acc | inference in 4150ms | 263.76 KB memory footprint
  # model: "models/digit_recognizer_v3_quantized_integer_quant_uint8.tflite" # 97.95% acc | inference in 1500ms | 153.83 KB memory footprint

  update_interval: 60s
  # Data collection requires data_collector component to be loaded
  # collect_low_confidence: true
  # collect_min_global_confidence: 0.90
  # collect_min_digit_confidence: 0.90

  # debug: true
  # debug_image: false # static embedded image (debug.jpg)
  # debug_image_out_serial: false
  # debug_memory: true
  # debug_timing: true

  # Preview of what the AI sees (Rotated Live Cam)
  # Set to true to enable continuous updates, or false for on-demand only (via button)
  # generate_preview: true
  # show_crop_areas: true # Draw boxes on preview

  crop_zones_global: ${id_prefix}_crop_zones  # local
  flash_light_controller: ${id_prefix}_flash_controller
  # data_collector: ${id_prefix}_data_collector  # Commented out: data_collector component not loaded

  ### Enhanced validation parameters
  # allow_negative_rates: false    # Prevent meter rollbacks
  # max_absolute_diff: 300         # Maximum allowed absolute difference

  value_sensor: ${id_prefix}_meter_value
  confidence_sensor: ${id_prefix}_meter_confidence

  inference_logs: ${id_prefix}_inference_logs
  main_logs: ${id_prefix}_main_logs

  total_inference_time_sensor: ${id_prefix}_inference_time
  capture_to_publish_time_sensor: ${id_prefix}_capture_to_publish_time

  enable_flash_calibration: false # still in dev

  ### Advanced parameters
  # frame_request_timeout: 15000  # ms (1000-60000)
  # high_confidence_threshold: 0.95
  # strict_confidence_check: true #all digits must be min at "high_confidence_threshold"

  # Pool efficiency monitoring (optional, requires DEBUG_METER_READER_MEMORY)
  # pool_job_efficiency_sensor: ${id_prefix}_pool_job_efficiency
  # pool_result_efficiency_sensor: ${id_prefix}_pool_result_efficiency
  # arena_efficiency_sensor: ${id_prefix}_arena_efficiency
  # heap_fragmentation_sensor: ${id_prefix}_heap_fragmentation

  unload_button: ${id_prefix}_unload_btn
  reload_button: ${id_prefix}_reload_btn

value_validator:
  id: ${id_prefix}_validator
  allow_negative_rates: false
  max_absolute_diff: 300
  # All available parameters (with defaults):
  # max_rate_change: 0.15                # Max rate change as percentage (default: 15%)
  # enable_smart_validation: true        # Enable adaptive validation (default: true)
  # smart_validation_window: 5           # Window size for pattern analysis (default: 5)
  # high_confidence_threshold: 0.90      # Threshold for high confidence (default: 90%)
  # per_digit_confidence_threshold: 0.85 # Min confidence per digit (default: 85%)
  # strict_confidence_check: false       # Require all digits meet threshold (default: false)
  # max_history_size: 50kB               # Max history memory usage (default: 50kB)

analog_reader: # DEV !
  id: ${id_prefix}_analog_reader
  camera_id: ${id_prefix}_espcam
  validator: ${id_prefix}_validator
  value_sensor:
    name: "Analog Total"
  debug: true
  update_interval: 60s
  dials:
    - id: dial_1
      scale: 0.1
      crop_x: 450
      crop_y: 191
      crop_w: 162
      crop_h: 162
      needle_type: DARK
      algorithm: radial_profile
      process_channel: GRAYSCALE
      deadzone_diameter: 40
      min_angle: 0
      max_angle: 360
      min_value: 0
      max_value: 10
      angle_offset: 0
      clockwise: true
      auto_contrast: true
      contrast: 1
      min_scan_radius: 0.3
      max_scan_radius: 0.9
    - id: dial_2
      scale: 0.1
      crop_x: 324
      crop_y: 312
      crop_w: 180
      crop_h: 168
      needle_type: DARK
      algorithm: radial_profile
      process_channel: GRAYSCALE
      deadzone_diameter: 40
      min_angle: 0
      max_angle: 360
      min_value: 0
      max_value: 10
      angle_offset: 0
      clockwise: true
      auto_contrast: true
      contrast: 1
      min_scan_radius: 0.3
      max_scan_radius: 0.9
    - id: dial_3
      scale: 0.1
      crop_x: 187
      crop_y: 350
      crop_w: 134
      crop_h: 130
      needle_type: DARK
      algorithm: radial_profile
      process_channel: GRAYSCALE
      deadzone_diameter: 40
      min_angle: 0
      max_angle: 360
      min_value: 0
      max_value: 10
      angle_offset: 0
      clockwise: true
      auto_contrast: true
      contrast: 1
      min_scan_radius: 0.3
      max_scan_radius: 0.9
      target_color: 16711680
      color_tolerance: 0
    - id: dial_4
      scale: 0.1
      crop_x: 37
      crop_y: 246
      crop_w: 148
      crop_h: 148
      needle_type: DARK
      algorithm: radial_profile
      process_channel: GRAYSCALE
      deadzone_diameter: 40
      min_angle: 0
      max_angle: 360
      min_value: 0
      max_value: 10
      angle_offset: 0
      clockwise: true
      auto_contrast: true
      contrast: 1
      min_scan_radius: 0.3
      max_scan_radius: 0.9
      target_color: 16711680
      color_tolerance: 0

      # New Per-Dial Sensors
      angle:
        name: "Dial 1 Angle"
        filters:
          - sliding_window_moving_average:
              window_size: 5
              send_every: 1
      value:
        name: "Dial 1 Value"
      confidence:
        name: "Dial 1 Confidence"

      # Internal Calibration (Raw Angle -> Corrected Value)
      calibration:
        - raw: 0.0
          mapped: 0.0
        - raw: 180.0
          mapped: 5.0
        - raw: 360.0
          mapped: 10.0

