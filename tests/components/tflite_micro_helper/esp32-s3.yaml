# ESPHome build test: tflite_micro_helper on ESP32-S3
esphome:
  name: test-tflite-micro-s3

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: y

external_components:
  - source:
      type: local
      path: ../../../components
    components: [tflite_micro_helper]

logger:
  level: DEBUG

tflite_micro_helper:
  id: test_tflite
  debug: true