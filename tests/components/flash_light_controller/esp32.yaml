# ESPHome build test: flash_light_controller on ESP32
esphome:
  name: test-flash

esp32:
  board: esp32dev
  framework:
    type: esp-idf

external_components:
  - source:
      type: local
      path: ../../../components
    components: [flash_light_controller]

output:
  - platform: gpio
    id: test_light_output
    pin: GPIO2

light:
  - platform: binary
    id: test_light
    output: test_light_output

logger:
  level: DEBUG

flash_light_controller:
  id: test_flash
  flash_light: test_light