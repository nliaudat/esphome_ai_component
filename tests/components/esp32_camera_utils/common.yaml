# ESPHome build test: esp32_camera_utils
esphome:
  name: test-camera-utils

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: DEBUG

esp32_camera:
  name: Test Camera
  external_clock:
    pin: GPIO0
    frequency: 20MHz
  i2c_pins:
    sda: GPIO26
    scl: GPIO27
  data_pins: [GPIO5, GPIO18, GPIO19, GPIO21, GPIO36, GPIO39, GPIO34, GPIO35]
  vsync_pin: GPIO25
  href_pin: GPIO23
  pixel_clock_pin: GPIO22
  power_down_pin: GPIO32
  resolution: 640x480
  pixel_format: JPEG

esp32_camera_utils:
  id: test_camera_utils
