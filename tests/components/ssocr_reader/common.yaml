# ESPHome build test: ssocr_reader common config (Alpha)
logger:
  level: DEBUG

external_components:
  - source:
      type: local
      path: ../../../components
    components: [ssocr_reader, esp32_camera_utils]

esp32_camera:
  name: Test Camera
  external_clock:
    pin: GPIO0
    frequency: 20MHz
  i2c_pins:
    sda: GPIO26
    scl: GPIO27
  data_pins: [GPIO5, GPIO18, GPIO19, GPIO21, GPIO36, GPIO39, GPIO34, GPIO35]
  vsync_pin: GPIO25
  href_pin: GPIO23
  pixel_clock_pin: GPIO22
  power_down_pin: GPIO32
  resolution: 640x480
  pixel_format: JPEG

esp32_camera_utils:
  id: test_camera_utils

ssocr_reader:
  id: test_ssocr
  camera_id: test_camera
  update_interval: 5s
  digit_count: 8
  threshold_level: 128
