  # others
  - !include globals.yaml
  - !include switch_others.yaml
  - !include sensor_others.yaml
  - !include logger.yaml
  - !include time.yaml

debug:
  update_interval: 60s

sensor:
  - platform: debug
    free:
      name: "Heap Free"
      entity_category: diagnostic
    loop_time:
      name: "Loop Time"
      entity_category: diagnostic
    psram:
      name: "Free PSRAM"
      entity_category: diagnostic

  # CPU Temperature
  - platform: internal_temperature
    name: "${id_prefix} CPU Temperature"
    id: ${id_prefix}_cpu_temperature
    unit_of_measurement: "degC"
    accuracy_decimals: 1
    device_class: temperature
    state_class: measurement
    icon: "mdi:thermometer"
    update_interval: 5s
    entity_category: diagnostic
