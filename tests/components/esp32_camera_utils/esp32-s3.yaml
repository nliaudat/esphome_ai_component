# ESPHome build test: esp32_camera_utils on ESP32-S3
esphome:
  name: test-camera-utils-s3

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: y

external_components:
  - source:
      type: local
      path: ../../../components
    components: [esp32_camera_utils]

logger:
  level: DEBUG

esp32_camera:
  name: Test Camera
  external_clock:
    pin: GPIO0
    frequency: 20MHz
  i2c_pins:
    sda: GPIO26
    scl: GPIO27
  data_pins: [GPIO5, GPIO18, GPIO19, GPIO21, GPIO36, GPIO39, GPIO34, GPIO35]
  vsync_pin: GPIO25
  href_pin: GPIO23
  pixel_clock_pin: GPIO22
  power_down_pin: GPIO32
  resolution: 640x480
  pixel_format: JPEG

esp32_camera_utils:
  id: test_camera_utils
  rotation: 90
  camera_window:
    offset_x: 0
    offset_y: 0
    width: 640
    height: 480
  scaler:
    width: 224
    height: 224
  cropper:
    width: 224
    height: 224
    offset_x: 0
    offset_y: 0